# Why does Matrix think Aphrodite and Eunomia are connected?
query AphroditeEunomiaPath($from: String!, $to: String!) {
  path(from: $from, to: $to, limit: 5) {
    status
    confidence
    recommended {
      confidence
      score
      reasons
      nodes {
        component
        version
        repo
      }
      edges {
        relationship
        capability
        status
        sourceFactId
        targetFactId
      }
    }
    paths {
      confidence
      score
      reasons
      nodes {
        component
        version
        repo
      }
    }
  }
}
