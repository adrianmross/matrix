name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.3.3"
        required: true
        type: string
      publish:
        description: "Publish artifacts to the GitHub Release"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust-target: x86_64-unknown-linux-musl
            linux-static: true
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            rust-target: ""
            linux-static: false
          - runner: macos-15
            target: aarch64-apple-darwin
            rust-target: ""
            linux-static: false

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install static Linux build dependencies
        if: ${{ matrix.linux-static }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y file musl-tools
          rustup target add "${{ matrix.rust-target }}"
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.rust-target }}
      - run: cargo test --workspace
      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          rust_target="${{ matrix.rust-target }}"
          release_dir="target/release"
          if [[ -n "${rust_target}" ]]; then
            release_dir="target/${rust_target}/release"
            cargo build --release -p matrix --no-default-features --target "${rust_target}"
            cargo build --release -p matrix-enter --target "${rust_target}"
            cargo build --release -p matrix-construct --target "${rust_target}"
          else
            cargo build --release -p matrix --no-default-features
            cargo build --release -p matrix-enter
            cargo build --release -p matrix-construct
          fi
          echo "RELEASE_DIR=${release_dir}" >> "${GITHUB_ENV}"
      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          version="${release_tag#v}"
          archive="matrix-${version}-${{ matrix.target }}"
          package_dir="dist/${archive}"
          mkdir -p "${package_dir}"
          cp "${RELEASE_DIR}/matrix" "${package_dir}/matrix"
          cp "${RELEASE_DIR}/matrix-enter" "${package_dir}/matrix-enter"
          cp "${RELEASE_DIR}/matrix-construct" "${package_dir}/matrix-construct"
          cp README.md LICENSE "${package_dir}/"
          chmod +x "${package_dir}/matrix" "${package_dir}/matrix-enter" "${package_dir}/matrix-construct"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
          (cd dist && shasum -a 256 "${archive}.tar.gz" > "${archive}.tar.gz.sha256")
      - name: Smoke packaged archive
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          version="${release_tag#v}"
          archive="matrix-${version}-${{ matrix.target }}"
          (cd dist && shasum -a 256 -c "${archive}.tar.gz.sha256")
          mkdir -p "smoke"
          tar -C smoke -xzf "dist/${archive}.tar.gz"
          "smoke/${archive}/matrix" --version | tee "smoke/${archive}/matrix.version"
          "smoke/${archive}/matrix-enter" --version | tee "smoke/${archive}/matrix-enter.version"
          "smoke/${archive}/matrix-construct" --version | tee "smoke/${archive}/matrix-construct.version"
          grep -Fx "matrix ${version}" "smoke/${archive}/matrix.version"
          grep -Fx "matrix-enter ${version}" "smoke/${archive}/matrix-enter.version"
          grep -Fx "matrix-construct ${version}" "smoke/${archive}/matrix-construct.version"
          if [[ "${{ matrix.linux-static }}" == "true" ]]; then
            for binary in matrix matrix-enter matrix-construct; do
              file "smoke/${archive}/${binary}" | tee "smoke/${archive}/${binary}.file"
              grep -Eq "statically linked|static-pie linked" "smoke/${archive}/${binary}.file"
            done
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          version="${release_tag#v}"
          expected=(
            "matrix-${version}-x86_64-unknown-linux-gnu.tar.gz"
            "matrix-${version}-x86_64-apple-darwin.tar.gz"
            "matrix-${version}-aarch64-apple-darwin.tar.gz"
          )
          for archive in "${expected[@]}"; do
            test -f "artifacts/${archive}"
            test -f "artifacts/${archive}.sha256"
            (cd artifacts && shasum -a 256 -c "${archive}.sha256")
          done
          archive_count="$(find artifacts -maxdepth 1 -name '*.tar.gz' | wc -l | tr -d ' ')"
          checksum_count="$(find artifacts -maxdepth 1 -name '*.sha256' | wc -l | tr -d ' ')"
          test "${archive_count}" = "3"
          test "${checksum_count}" = "3"
      - name: Create release notes
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          {
            echo "Matrix ${release_tag}"
            echo
            echo "Artifacts include:"
            echo
            echo "- matrix CLI"
            echo "- matrix-enter interactive shell"
            echo "- matrix-construct service"
            echo
            echo "Release validation:"
            echo
            echo "- Packaged binaries were executed on their target runner with --version."
            echo "- The Linux x86_64 archive is statically linked with musl to avoid host glibc version coupling."
            echo "- SHA-256 checksum files were verified before publishing."
            echo "- The matrix-construct container image was built and smoked with --version."
            if [[ "${{ github.event_name != 'workflow_dispatch' || inputs.publish }}" == "true" ]]; then
              echo "- The matrix-construct container image was published to ghcr.io/${{ github.repository_owner }}/matrix-construct:${release_tag#v}."
            else
              echo "- Container image publishing was skipped because publish=false."
            fi
            echo
            echo "SHA-256 checksums:"
            echo
            for checksum in artifacts/*.sha256; do
              digest="$(awk '{print $1}' "${checksum}")"
              file="$(basename "${checksum%.sha256}")"
              echo "- ${file}: ${digest}"
            done
          } > RELEASE_NOTES.md
      - name: Publish release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" artifacts/* --clobber
          else
            gh release create "${release_tag}" artifacts/* \
              --verify-tag \
              --title "Matrix ${release_tag}" \
              --notes-file RELEASE_NOTES.md
          fi

  construct-image:
    name: Build matrix-construct image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag || github.ref_name }}"
          version="${release_tag#v}"
          image="ghcr.io/${{ github.repository_owner }}/matrix-construct:${version}"
          docker build -f crates/matrix-construct/Dockerfile -t "${image}" .
          echo "image=${image}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_ENV}"
      - name: Smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm "${image}" --version | tee image.version
          grep -Fx "matrix-construct ${version}" image.version
      - name: Login to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push image
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        shell: bash
        run: docker push "${image}"
